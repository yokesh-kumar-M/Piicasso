version: '3.8'

# ─── PIIcasso Full Stack ──────────────────────────────────────────────────────
# Services:
#   web         → Django backend (port 8000)
#   frontend    → React frontend (port 80 via Nginx)
#   db          → PostgreSQL database
#   redis       → Redis for caching, sessions, Celery broker
#   prometheus  → Metrics collection (port 9090)
#   grafana     → Metrics dashboard (port 3001)
#   loki        → Log aggregation
#   promtail    → Log shipping agent
#
# NOTE: PIIlogger is a SEPARATE standalone project — it is NOT part of this repository.
#       Repo: Django/piilogger/  |  Run: npm start  |  Dashboard: http://localhost:4000
#       Set PIILOGGER_URL in backend/.env to point to wherever it is running.
# ─────────────────────────────────────────────────────────────────────────────

services:
  web:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: sh ./start.sh
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
      - app_logs:/app/logs
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?Set POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER:?Set POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      - PIILOGGER_URL=${PIILOGGER_URL:-http://localhost:4000/logs}
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - piicasso_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - piicasso_net

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?Set POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER:?Set POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - piicasso_net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - piicasso_net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - piicasso_net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - piicasso_net

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - piicasso_net

  promtail:
    image: grafana/promtail:latest
    volumes:
      - /var/log:/var/log
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - app_logs:/app/logs
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - piicasso_net

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  app_logs:
  prometheus_data:
  grafana_data:

networks:
  piicasso_net:
    driver: bridge
