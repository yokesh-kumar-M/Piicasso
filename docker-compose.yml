version: '3.8'

name: piicasso-platform-dev

services:
  # ========================================================
  # 1. CORE ENGINE (Main Backend Monolith)
  # ========================================================
  core-engine:
    build: 
      context: ./Piicasso/backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Piicasso/backend:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost
      - ALLOWED_HOSTS=localhost,core-engine,127.0.0.1
    networks:
      - piicasso_net
    depends_on:
      - redis

  # ========================================================
  # 2. FRONTEND (React Application)
  # ========================================================
  frontend:
    build:
      context: ./Piicasso/frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Piicasso/frontend/src:/app/src
      - ./Piicasso/frontend/public:/app/public
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/
      - CHOKIDAR_USEPOLLING=true
    networks:
      - piicasso_net

  # ========================================================
  # 3. ASYNC WORKERS (Celery)
  # ========================================================
  celery-worker:
    build: 
      context: ./Piicasso/backend
      dockerfile: Dockerfile.dev
    command: celery -A backend worker -l info
    volumes:
      - ./Piicasso/backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - piicasso_net
    depends_on:
      - redis

  # ========================================================
  # 4. INFRASTRUCTURE (Caching Layer)
  # ========================================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - piicasso_net

  # ========================================================
  # 5. PIILOGGER (Log Monitoring)
  # ========================================================
  piilogger:
    build:
      context: ./piilogger
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - LOG_LEVEL=debug
    networks:
      - piicasso_net

networks:
  piicasso_net:
    driver: bridge

volumes:
  redis_data:
