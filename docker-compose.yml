version: '3.8'

name: piicasso-platform-dev

services:
  # ========================================================
  # 1. API GATEWAY (Load Balancer & Reverse Proxy)
  # Name: PIIcasso Gateway
  # ========================================================
  api-gateway:
    build:
      context: ./gateway
    ports:
      - "80:80"
    depends_on:
      - core-engine
      - identity-service
      - frontend
    networks:
      - piicasso_net

  # ========================================================
  # 2. CORE ENGINE (Main Backend Monolith)
  # ========================================================
  core-engine:
    build: 
      context: ./Piicasso/backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Piicasso/backend:/app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USER_MICROSERVICE_URL=http://api-gateway:80/api/user/
      - CORS_ALLOWED_ORIGINS=http://localhost
      - ALLOWED_HOSTS=localhost,api-gateway,core-engine,127.0.0.1
    networks:
      - piicasso_net
    depends_on:
      - redis

  # ========================================================
  # 3. IDENTITY SERVICE (Decoupled User Microservice)
  # ========================================================
  identity-service:
    build:
      context: ./identity_service
      dockerfile: Dockerfile.dev
    volumes:
      - ./identity_service:/app
    environment:
      - REDIS_URL=redis://redis:6379/1
      - CORS_ALLOWED_ORIGINS=http://localhost
      - ALLOWED_HOSTS=localhost,api-gateway,identity-service,127.0.0.1
    networks:
      - piicasso_net
    depends_on:
      - redis

  # ========================================================
  # 4. FRONTEND (React Application)
  # ========================================================
  frontend:
    build:
      context: ./Piicasso/frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Piicasso/frontend/src:/app/src
      - ./Piicasso/frontend/public:/app/public
    environment:
      - REACT_APP_API_URL=/api/
      - WDS_SOCKET_PORT=80
      - CHOKIDAR_USEPOLLING=true
    networks:
      - piicasso_net

  # ========================================================
  # 5. ASYNC WORKERS (Celery)
  # ========================================================
  celery-worker:
    build: 
      context: ./Piicasso/backend
      dockerfile: Dockerfile.dev
    command: celery -A backend worker -l info
    volumes:
      - ./Piicasso/backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - piicasso_net
    depends_on:
      - redis

  # ========================================================
  # 6. INFRASTRUCTURE (Caching Layer)
  # ========================================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - piicasso_net

networks:
  piicasso_net:
    driver: bridge

volumes:
  redis_data:
