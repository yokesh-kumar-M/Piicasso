version: '3.8'

# ─── PIIcasso Platform — Development Stack ───────────────────────────────────
# Runs all PIIcasso services for local development.
#
# Service URLs:
#   Backend (Django)  → http://localhost:8000
#   Frontend (React)  → http://localhost:3000
#   Redis             → localhost:6379
#
# NOTE: PIIlogger is a SEPARATE standalone project located at:
#   c:\Users\yokes\OneDrive\Documents\Full-stack\Django\piilogger\
#   Run it independently: cd ../piilogger && npm start  (http://localhost:4000)
#   Set PIILOGGER_URL=http://host.docker.internal:4000/logs in backend/.env
# ─────────────────────────────────────────────────────────────────────────────

name: piicasso-platform-dev

services:

  # ─── 1. Django Backend ───────────────────────────────────────────────────────
  core-engine:
    build:
      context: ./Piicasso/backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Piicasso/backend:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost
      - ALLOWED_HOSTS=localhost,core-engine,127.0.0.1
    env_file:
      - ./Piicasso/backend/.env
    networks:
      - piicasso_net
    depends_on:
      - redis

  # ─── 2. React Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Piicasso/frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./Piicasso/frontend/src:/app/src
      - ./Piicasso/frontend/public:/app/public
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/
      - CHOKIDAR_USEPOLLING=true
    networks:
      - piicasso_net

  # ─── 3. Celery Worker ────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./Piicasso/backend
      dockerfile: Dockerfile.dev
    command: celery -A backend worker -l info
    volumes:
      - ./Piicasso/backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - ./Piicasso/backend/.env
    networks:
      - piicasso_net
    depends_on:
      - redis

  # ─── 4. Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - piicasso_net

networks:
  piicasso_net:
    driver: bridge

volumes:
  redis_data:
