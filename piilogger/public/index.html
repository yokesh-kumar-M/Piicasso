<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIIcasso | Secure Log Aggregator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background-color: #0B0E14; /* Deep dark blue/black */
      color: #E2E8F0;
    }
    /* Custom Scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0F172A;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
    .log-container {
      height: calc(100vh - 140px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    .neon-border {
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .blur-backdrop {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="font-sans h-screen flex flex-col antialiased selection:bg-blue-500/30">

  <!-- ======================= LOGIN VIEW ======================= -->
  <div id="login-view" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0B0E14] bg-opacity-90 blur-backdrop transition-opacity duration-300">
    <div class="w-full max-w-md p-8 rounded-xl bg-[#0F172A] neon-border">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-900/30 text-blue-400 mb-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-white tracking-tight">PIIcasso System Auth</h2>
        <p class="text-sm text-slate-400 mt-2">Restricted Access. Authenticate to proceed.</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Operator ID</label>
          <input type="text" id="username" class="w-full bg-[#1E293B] border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="Enter ID (e.g., SEM8)" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Passphrase</label>
          <input type="password" id="password" class="w-full bg-[#1E293B] border border-slate-700 rounded-lg px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="••••••••••••" required>
        </div>
        <div id="login-error" class="hidden text-red-400 text-sm font-medium bg-red-400/10 border border-red-400/20 rounded p-2 text-center"></div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg transition-colors shadow-[0_0_15px_rgba(37,99,235,0.4)]">
          Initiate Session
        </button>
      </form>
      <div class="mt-6 text-center">
        <button id="recover-btn" class="text-xs text-slate-500 hover:text-blue-400 transition-colors">Emergency Access Recovery</button>
      </div>
      <div id="recover-msg" class="hidden mt-4 text-emerald-400 text-xs text-center font-medium bg-emerald-400/10 border border-emerald-400/20 rounded p-2"></div>
    </div>
  </div>

  <!-- ======================= DASHBOARD VIEW ======================= -->
  <div id="dashboard-view" class="hidden h-full flex flex-col">
    <!-- Header -->
    <header class="bg-[#0F172A] px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-lg bg-blue-600/20 border border-blue-500/50 flex items-center justify-center text-blue-400">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
        </div>
        <div>
          <h1 class="text-lg font-bold text-white tracking-wide flex items-center gap-2">
            PIIcasso Telemetry
            <span class="flex h-2 w-2 relative">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
          </h1>
          <p class="text-xs text-slate-400 font-mono">LIVE FEED ENCRYPTED // NODE: ALPHA</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex bg-[#1E293B] rounded-lg p-1 border border-slate-700">
          <select id="service-filter" class="bg-transparent text-sm text-slate-300 rounded focus:outline-none block px-3 py-1 cursor-pointer hover:text-white transition-colors border-r border-slate-700">
            <option value="all">Global Feed</option>
            <option value="core-engine">Core Engine</option>
            <option value="identity-service">Identity Service</option>
          </select>
          <select id="level-filter" class="bg-transparent text-sm text-slate-300 rounded focus:outline-none block px-3 py-1 cursor-pointer hover:text-white transition-colors">
            <option value="all">All Severities</option>
            <option value="ERROR">Critical (ERROR)</option>
            <option value="WARNING">Warn (WARNING)</option>
            <option value="INFO">Info (INFO)</option>
          </select>
        </div>
        <button id="clear-btn" class="p-2 text-slate-400 hover:text-red-400 hover:bg-red-400/10 rounded-lg transition-colors border border-transparent hover:border-red-400/20" title="Purge Local Buffer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
        <button id="logout-btn" class="px-4 py-2 bg-slate-800 text-slate-300 border border-slate-700 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-sm font-medium">Terminate Session</button>
      </div>
    </header>

    <!-- Logs Container -->
    <main class="flex-1 p-6 overflow-hidden flex flex-col bg-[#0B0E14]">
      <div class="bg-[#0F172A] rounded-xl shadow-2xl border border-slate-800 flex-1 flex flex-col overflow-hidden relative">
        
        <!-- Table Header -->
        <div class="grid grid-cols-12 gap-4 px-6 py-3 bg-[#1E293B] text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-slate-700 shrink-0">
          <div class="col-span-2">Time (UTC)</div>
          <div class="col-span-2">Subsystem</div>
          <div class="col-span-1 text-center">Sev</div>
          <div class="col-span-7">Payload Data</div>
        </div>

        <!-- Logs List -->
        <div id="logs-list" class="log-container p-2 flex flex-col gap-1 relative z-10 font-mono">
          <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 italic">
            <svg class="w-12 h-12 mb-3 text-slate-600 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
            Listening for telemetry streams...
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const loginView = document.getElementById('login-view');
    const dashboardView = document.getElementById('dashboard-view');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const recoverBtn = document.getElementById('recover-btn');
    const recoverMsg = document.getElementById('recover-msg');
    const logoutBtn = document.getElementById('logout-btn');

    const logsList = document.getElementById('logs-list');
    const emptyState = document.getElementById('empty-state');
    const serviceFilter = document.getElementById('service-filter');
    const levelFilter = document.getElementById('level-filter');
    const clearBtn = document.getElementById('clear-btn');
    
    let socket = null;
    let allLogs = [];

    // --- AUTHENTICATION LOGIC ---

    const checkAuth = async () => {
      try {
        const res = await fetch('/api/check-auth');
        const data = await res.json();
        if (data.authenticated) {
          showDashboard();
        } else {
          showLogin();
        }
      } catch (e) {
        showLogin();
      }
    };

    const showLogin = () => {
      loginView.classList.remove('hidden');
      dashboardView.classList.add('hidden');
      if (socket) socket.disconnect();
    };

    const showDashboard = () => {
      loginView.classList.add('hidden');
      dashboardView.classList.remove('hidden');
      initSocket();
      fetchLogs();
    };

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      loginError.classList.add('hidden');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        
        if (data.success) {
          showDashboard();
        } else {
          loginError.textContent = 'ACCESS DENIED. INCORRECT CREDENTIALS.';
          loginError.classList.remove('hidden');
        }
      } catch (err) {
        loginError.textContent = 'SYSTEM ERROR. SERVER UNREACHABLE.';
        loginError.classList.remove('hidden');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      showLogin();
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    });

    recoverBtn.addEventListener('click', async () => {
      recoverBtn.disabled = true;
      recoverMsg.classList.add('hidden');
      
      try {
        const res = await fetch('/api/recover', { method: 'POST' });
        const data = await res.json();
        if(data.success) {
          recoverMsg.textContent = "Protocol Alpha engaged. Instructions dispatched to yokeshkumar1704@gmail.com";
          recoverMsg.classList.remove('hidden');
        }
      } catch (e) {
        recoverMsg.textContent = "Recovery failed. System offline.";
        recoverMsg.classList.remove('hidden');
        recoverMsg.classList.replace('text-emerald-400', 'text-red-400');
        recoverMsg.classList.replace('bg-emerald-400/10', 'bg-red-400/10');
        recoverMsg.classList.replace('border-emerald-400/20', 'border-red-400/20');
      }
      
      setTimeout(() => { recoverBtn.disabled = false; }, 3000);
    });

    // --- LOGS LOGIC ---

    const initSocket = () => {
      if (socket) return; // already connected
      socket = io();
      
      socket.on('new_log', (log) => {
        allLogs.push(log);
        if (allLogs.length > 2000) allLogs.shift();
        renderLogs();
      });
      
      socket.on('connect_error', (err) => {
        if (err.message === 'unauthorized') {
          showLogin();
        }
      });
    };

    const getLevelStyle = (level) => {
      switch (level.toUpperCase()) {
        case 'ERROR': return 'text-red-400 bg-red-500/10 border border-red-500/20';
        case 'WARNING': return 'text-amber-400 bg-amber-500/10 border border-amber-500/20';
        case 'INFO': return 'text-blue-400 bg-blue-500/10 border border-blue-500/20';
        default: return 'text-slate-400 bg-slate-500/10 border border-slate-500/20';
      }
    };

    const formatTime = (isoString) => {
      const d = new Date(isoString);
      return d.toISOString().split('T')[1].replace('Z', '');
    };

    const createLogElement = (log) => {
      const el = document.createElement('div');
      el.className = 'grid grid-cols-12 gap-4 px-4 py-2.5 rounded-lg hover:bg-[#1E293B] transition-colors text-sm items-start group border border-transparent hover:border-slate-700';
      
      const isError = log.level.toUpperCase() === 'ERROR';
      
      el.innerHTML = `
        <div class="col-span-2 text-slate-500 text-[11px] mt-1">${formatTime(log.timestamp)}</div>
        <div class="col-span-2">
          <span class="px-2 py-1 rounded text-[11px] font-semibold bg-[#0F172A] text-slate-300 border border-slate-700 truncate inline-block max-w-full shadow-inner">
            ${log.service}
          </span>
        </div>
        <div class="col-span-1 text-center">
          <span class="px-2 py-0.5 rounded text-[10px] font-bold tracking-widest ${getLevelStyle(log.level)} inline-block">
            ${log.level.substring(0,4)}
          </span>
        </div>
        <div class="col-span-7 break-words whitespace-pre-wrap leading-relaxed ${isError ? 'text-red-300' : 'text-slate-300'}">
          ${log.message}
        </div>
      `;
      return el;
    };

    const renderLogs = () => {
      const sFilter = serviceFilter.value;
      const lFilter = levelFilter.value;
      
      const filtered = allLogs.filter(log => {
        const matchService = sFilter === 'all' || log.service === sFilter;
        const matchLevel = lFilter === 'all' || log.level === lFilter;
        return matchService && matchLevel;
      });

      // Clear existing UI logs except empty state
      Array.from(logsList.children).forEach(child => {
        if (child.id !== 'empty-state') {
          logsList.removeChild(child);
        }
      });

      if (filtered.length === 0) {
        emptyState.style.display = 'flex';
      } else {
        emptyState.style.display = 'none';
        filtered.forEach(log => logsList.appendChild(createLogElement(log)));
        logsList.scrollTop = logsList.scrollHeight; // auto scroll
      }
    };

    const fetchLogs = async () => {
      try {
        const res = await fetch('/api/logs?limit=150');
        if (res.status === 401) {
          showLogin();
          return;
        }
        const data = await res.json();
        allLogs = data;
        renderLogs();
      } catch (err) {
        console.error("Failed to fetch history:", err);
      }
    };

    // Event Listeners
    serviceFilter.addEventListener('change', renderLogs);
    levelFilter.addEventListener('change', renderLogs);
    
    clearBtn.addEventListener('click', () => {
      allLogs = [];
      renderLogs();
    });

    // Boot
    checkAuth();
  </script>
</body>
</html>
