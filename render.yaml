services:
  # ─── Main Django Backend ─────────────────────────────────────────────────────
  - type: web
    name: piicasso
    env: docker
    plan: free
    region: singapore
    branch: main
    rootDir: Piicasso/backend
    dockerfilePath: Dockerfile
    autoDeploy: true
    dockerCommand: sh ./start.sh
    envVars:
      - key: PORT
        value: 8000
      - key: DEBUG
        value: 'False'
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: piicasso-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: piicasso-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false       # Set manually in Render dashboard
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: piicasso.onrender.com,.onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        value: https://piicasso.onrender.com,https://pii-casso.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false       # Set manually in Render dashboard
      - key: PIILOGGER_URL
        sync: false       # Set to your deployed piilogger URL, e.g. https://piilogger-service.onrender.com/logs

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  - type: worker
    name: celery-worker
    env: docker
    plan: free
    region: singapore
    branch: main
    rootDir: Piicasso/backend
    dockerfilePath: Dockerfile
    dockerCommand: sh ./start-celery.sh
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: piicasso-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: piicasso-redis
          property: connectionString

  # ─── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: piicasso-redis
    plan: free
    region: singapore
    ipAllowList: []

databases:
  # ─── Primary PostgreSQL Database ─────────────────────────────────────────────
  - name: piicasso-db
    plan: free
    region: singapore
    databaseName: piicasso
    user: piicasso_user
