services:
  # ─── Main Django Backend ─────────────────────────────────────────────────────
  - type: web
    name: core-engine
    env: docker
    plan: free
    region: singapore
    branch: main
    rootDir: Piicasso/backend
    dockerfilePath: Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health/
    dockerCommand: sh ./start.sh
    envVars:
      - key: PORT
        value: '8000'
      - key: DEBUG
        value: 'False'
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false       # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false       # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false       # Set manually in Render dashboard
      - key: SENTRY_DSN
        sync: false       # Set manually in Render dashboard
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: core-engine-woeg.onrender.com,.onrender.com,localhost
      - key: CORS_ALLOWED_ORIGINS
        value: https://core-engine-woeg.onrender.com,https://pii-casso.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false       # Set manually in Render dashboard
      - key: ACCESS_TOKEN_MINUTES
        value: '15'
      - key: REFRESH_TOKEN_DAYS
        value: '1'
