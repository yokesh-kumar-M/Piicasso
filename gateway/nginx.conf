worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    
    # ----------------------------------------------------
    # PIIcasso API Gateway - Load Balancer Configuration
    # ----------------------------------------------------
    # Docker's internal DNS automatically resolves these names 
    # to all active replicas (Round Robin Load Balancing)
    
    # Load dynamic resolvers
    include /etc/nginx/resolvers.conf;

    server {
        listen 80;
        server_name localhost;

        # Standard Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Use variables for upstream proxy_pass to avoid startup crashes if they aren't up yet
        set $identity_service_url "https://identity-service-0fdr.onrender.com";
        set $core_engine_url "https://core-engine-woeg.onrender.com";

        # 1. Identity & Team Microservice (Microservice routes)
        location /api/user/ {
            proxy_pass $identity_service_url;
            proxy_set_header Host identity-service-0fdr.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_ssl_server_name on;
        }

        location /api/password/ {
            proxy_pass $identity_service_url;
            proxy_set_header Host identity-service-0fdr.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_ssl_server_name on;
        }

        location /api/teams/ {
            proxy_pass $identity_service_url;
            proxy_set_header Host identity-service-0fdr.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_ssl_server_name on;
        }

        # 2. Core Engine (Main Backend Monolith)
        location /api/ {
            proxy_pass $core_engine_url;
            proxy_set_header Host core-engine-woeg.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_ssl_server_name on;
        }

        # 3. Core Static Files
        location /static/ {
            proxy_pass $core_engine_url/static/;
            proxy_set_header Host core-engine-woeg.onrender.com;
            proxy_ssl_server_name on;
        }
    }
}
