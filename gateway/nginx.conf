worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    
    # ----------------------------------------------------
    # PIIcasso API Gateway - Load Balancer Configuration
    # ----------------------------------------------------
    # Docker's internal DNS automatically resolves these names 
    # to all active replicas (Round Robin Load Balancing)
    
    upstream core_engine {
        server core-engine:8000;
    }

    upstream identity_service {
        server identity-service:8001;
    }

    server {
        listen 80;
        server_name localhost;

        # Standard Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # 1. Identity & Team Microservice (Microservice routes)
        location /api/user/ {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/password/ {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/teams/ {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Core Engine (Main Backend Monolith)
        location /api/ {
            proxy_pass http://core_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Core Static Files
        location /static/ {
            proxy_pass http://core_engine/static/;
        }
    }
}
