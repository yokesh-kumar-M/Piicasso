name: CI Pipeline

on: [push, pull_request]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd Piicasso/backend
          pip install -r requirements.txt
          pip install flake8

      - name: Wait for Postgres
        run: |
          cd Piicasso/backend
          python -c "
          import time, psycopg2
          for i in range(10):
              try:
                  psycopg2.connect(host='postgres', port=5432, user='postgres', password='postgres', dbname='test_db').close()
                  print('Postgres is ready!')
                  break
              except Exception as e:
                  print(f'Waiting for Postgres... ({i+1})')
                  time.sleep(3)
          "

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/test_db
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          ENV: test
          GOOGLE_CLIENT_ID: test-google-client-id
          FIELD_ENCRYPTION_KEY: fOvza1qJxOBvbKrJnLZtdXfXq7-MWMspVH1-qf5lZRo=
        run: |
          cd Piicasso/backend
          python manage.py test --verbosity=2

      - name: Lint with flake8
        run: |
          cd Piicasso/backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd Piicasso/frontend
          npm install

      - name: Run frontend tests
        run: |
          cd Piicasso/frontend
          npm test -- --watchAll=false --passWithNoTests

      - name: Build production bundle
        run: |
          cd Piicasso/frontend
          npm run build

      - name: Check bundle size
        run: |
          cd Piicasso/frontend/build/static/js
          echo "Bundle sizes:"
          ls -lh *.js
          echo "Total JS size:"
          du -sh *.js
