name: PIIcasso CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master", "dev" ]

jobs:
  test-monolith:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Piicasso/backend
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Django Checks
      env:
        DJANGO_SECRET_KEY: test-key-123
        DATABASE_URL: sqlite:////tmp/db.sqlite3
      run: |
        python manage.py check

  test-user-microservice:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./user_microservice
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Django Checks
      env:
        DJANGO_SECRET_KEY: test-key-123
        DATABASE_URL: sqlite:////tmp/db.sqlite3
      run: |
        python manage.py check

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Piicasso/frontend
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: './Piicasso/frontend/package-lock.json'
    - name: Install dependencies
      run: npm ci
    - name: Build frontend
      run: npm run build
      env:
        CI: false

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-monolith, test-user-microservice, test-frontend]
    defaults:
      run:
        working-directory: ./Piicasso
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build all Docker containers
      run: docker compose build
      
    - name: Push Monolith Backend Image (Dummy)
      run: echo "docker push ghcr.io/${{ github.actor }}/piicasso-backend:latest"
      
    - name: Push User Microservice Image (Dummy)
      run: echo "docker push ghcr.io/${{ github.actor }}/piicasso-user-microservice:latest"
      
    - name: Push Frontend Gateway Image (Dummy)
      run: echo "docker push ghcr.io/${{ github.actor }}/piicasso-frontend:latest"
