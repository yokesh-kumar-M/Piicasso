name: CI Pipeline

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Piicasso/backend/requirements.txt

      - name: Install dependencies
        run: |
          cd Piicasso/backend
          pip install -r requirements.txt
          pip install flake8

      - name: Wait for Postgres
        run: |
          cd Piicasso/backend
          python -c "
          import time, psycopg2, sys
          for i in range(10):
              try:
                  psycopg2.connect(host='localhost', port=5432, user='postgres', password='postgres', dbname='test_db').close()
                  print('Postgres is ready!')
                  break
              except Exception as e:
                  print(f'Waiting for Postgres... ({i+1}): {e}')
                  time.sleep(3)
          else:
              print('ERROR: Postgres never became ready')
              sys.exit(1)
          "

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          ENV: test
          GOOGLE_CLIENT_ID: test-google-client-id
          FIELD_ENCRYPTION_KEY: fOvza1qJxOBvbKrJnLZtdXfXq7-MWMspVH1-qf5lZRo=
        run: |
          cd Piicasso/backend
          python manage.py test --verbosity=2

      - name: Lint with flake8
        run: |
          cd Piicasso/backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Piicasso/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd Piicasso/frontend
          npm ci || npm install

      - name: Run frontend tests
        run: |
          cd Piicasso/frontend
          npm test -- --watchAll=false --passWithNoTests

      - name: Build production bundle
        env:
          CI: 'false'
        run: |
          cd Piicasso/frontend
          npm run build

      - name: Check bundle size
        run: |
          cd Piicasso/frontend/build/static/js
          echo "Bundle sizes:"
          ls -lh *.js
          echo "Total JS size:"
          du -sh *.js
