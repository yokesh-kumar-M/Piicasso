name: CI Pipeline

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    env:
      # Mapped from the repo secret so step-level `if` can skip the Snyk gate
      # gracefully when the token is absent (e.g. fork / Dependabot PRs).
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Piicasso/backend/requirements.txt

      - name: Install dependencies
        run: |
          cd Piicasso/backend
          pip install -r requirements.txt
          pip install flake8

      - name: Wait for Postgres
        run: |
          cd Piicasso/backend
          python -c "
          import time, psycopg2, sys
          for i in range(10):
              try:
                  psycopg2.connect(host='localhost', port=5432, user='postgres', password='postgres', dbname='test_db').close()
                  print('Postgres is ready!')
                  break
              except Exception as e:
                  print(f'Waiting for Postgres... ({i+1}): {e}')
                  time.sleep(3)
          else:
              print('ERROR: Postgres never became ready')
              sys.exit(1)
          "

      - name: Check for missing migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          ENV: test
          GOOGLE_CLIENT_ID: test-google-client-id
          FIELD_ENCRYPTION_KEY: fOvza1qJxOBvbKrJnLZtdXfXq7-MWMspVH1-qf5lZRo=
        run: |
          cd Piicasso/backend
          python manage.py makemigrations --check --dry-run

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          DJANGO_SECRET_KEY: test-secret-key-not-for-production
          ENV: test
          GOOGLE_CLIENT_ID: test-google-client-id
          FIELD_ENCRYPTION_KEY: fOvza1qJxOBvbKrJnLZtdXfXq7-MWMspVH1-qf5lZRo=
        run: |
          cd Piicasso/backend
          python manage.py test --verbosity=2

      - name: Lint with flake8 (hard fail on syntax / undefined names)
        run: |
          cd Piicasso/backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: pip-audit (advisory)
        run: |
          cd Piicasso/backend
          pip install pip-audit
          pip-audit --strict --requirement requirements.txt || true

      - name: Snyk test (gate on high/critical Python deps)
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          cd Piicasso/backend
          npm install -g snyk
          # Deps were installed in the "Install dependencies" step above, so
          # Snyk reads the resolved versions from requirements.txt rather than a
          # stale environment. The medium 'twisted' command-injection advisory
          # (SNYK-PYTHON-TWISTED-12671201) has no upstream fix and sits below
          # this threshold by design — the build fails only on high/critical.
          snyk test --severity-threshold=high

  frontend-tests:
    runs-on: ubuntu-latest

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Piicasso/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd Piicasso/frontend
          npm ci || npm install

      - name: Run frontend tests
        run: |
          cd Piicasso/frontend
          npm test

      - name: Build production bundle
        run: |
          cd Piicasso/frontend
          npm run build

      - name: Check bundle size
        run: |
          cd Piicasso/frontend/build/assets
          echo "Bundle sizes:"
          ls -lh *.js
          echo "Total JS size:"
          du -sh *.js

      - name: npm audit (advisory)
        run: |
          cd Piicasso/frontend
          npm audit --audit-level=high || true

      - name: Snyk test (gate on high/critical npm deps)
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          cd Piicasso/frontend
          npm install -g snyk
          snyk test --severity-threshold=high

  backend-docker-build:
    # Builds the production backend image so a broken Dockerfile (e.g. a bad
    # base image or missing build dep) fails CI instead of breaking the Render
    # deploy, which builds from this same Dockerfile on push to main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend Docker image
        run: docker build -t piicasso-backend:ci Piicasso/backend
